name: Release

on:
  workflow_dispatch:
    inputs:
      publish_npm:
        description: "Publish package to npm. Requires running this workflow on a tag with NPM_TOKEN configured."
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: darwin-arm64
          - os: ubuntu-latest
            name: linux-x64
          - os: windows-latest
            name: windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache-dependency-path: core-go/go.sum
      - run: npm ci
      - run: npm run build
      - name: Pack npm tarball
        run: npm pack
      - uses: actions/upload-artifact@v4
        with:
          name: senny-cli-${{ matrix.name }}
          path: |
            senny-cli-*.tgz
            core-go/bin/*

  publish-npm:
    if: github.event_name == 'workflow_dispatch' && inputs.publish_npm == true && startsWith(github.ref, 'refs/tags/')
    needs: package
    runs-on: macos-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache-dependency-path: core-go/go.sum
      - run: npm ci
      - run: npm run build
      - name: Check npm token
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN repository secret is required to publish to npm."
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
