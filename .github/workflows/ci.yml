name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache-dependency-path: core-go/go.sum
      - run: npm ci
      - run: npm run check

  bun-smoke:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache-dependency-path: core-go/go.sum
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: npm ci
      - run: npm run build
      - run: npm run bench:runtime:bun
